name: Daily Opportunity Digest

on:
  schedule:
    - cron: '0 8 */2 * *'   # ~every other day at 9am London (08:00 UTC, BST).
                              # GitHub cron is UTC and doesn't shift for DST -
                              # change to '0 9 */2 * *' for 9am GMT in winter
                              # (late Oct - late Mar).
                              # Note: */2 on day-of-month means it occasionally
                              # fires on two consecutive days at month boundaries.
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python job_digest.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Commit updated seen_postings.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen_postings.json
          git diff --staged --quiet || git commit -m "Update seen postings"
          git push
